{{- if .Values.schemaInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wso2am-mysql.fullname" . }}-schema-init
  labels:
    {{- include "wso2am-mysql.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "wso2am-mysql.selectorLabels" . | nindent 8 }}
        job: schema-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MySQL to be ready..."
              until nc -z {{ include "wso2am-mysql.fullname" . }} 3306; do
                echo "MySQL not ready, retrying in 3s..."
                sleep 3
              done
              echo "MySQL is ready"
        - name: extract-scripts
          image: {{ .Values.schemaInit.apim.image }}
          command:
            - /bin/sh
            - -c
            - |
              cp {{ .Values.schemaInit.apim.home }}/{{ .Values.schemaInit.scripts.apim_db }} /scripts/apim_db.sql
              cp {{ .Values.schemaInit.apim.home }}/{{ .Values.schemaInit.scripts.shared_db }} /scripts/shared_db.sql
              echo "SQL scripts extracted"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      containers:
        - name: schema-loader
          image: {{ .Values.mysql.image }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Loading apim_db schema..."
              mysql -h {{ include "wso2am-mysql.fullname" . }} -uroot -p${MYSQL_ROOT_PASSWORD} apim_db < /scripts/apim_db.sql
              echo "Loading shared_db schema..."
              mysql -h {{ include "wso2am-mysql.fullname" . }} -uroot -p${MYSQL_ROOT_PASSWORD} shared_db < /scripts/shared_db.sql
              echo "Verifying..."
              mysql -h {{ include "wso2am-mysql.fullname" . }} -uroot -p${MYSQL_ROOT_PASSWORD} -e \
                "SELECT 'apim_db' AS db, COUNT(*) AS tables_count FROM information_schema.tables WHERE table_schema='apim_db' UNION ALL SELECT 'shared_db', COUNT(*) FROM information_schema.tables WHERE table_schema='shared_db';"
              echo "Schema initialization complete!"
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.mysql.rootPassword | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          emptyDir: {}
{{- end }}
