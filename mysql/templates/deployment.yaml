apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wso2am-mysql.fullname" . }}
  labels:
    {{- include "wso2am-mysql.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "wso2am-mysql.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "wso2am-mysql.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mysql
          image: {{ .Values.mysql.image }}
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.mysql.rootPassword | quote }}
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            {{- toYaml .Values.mysql.resources | nindent 12 }}
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
                - -p{{ .Values.mysql.rootPassword }}
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: mysql-data
          {{- if .Values.mysql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "wso2am-mysql.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: initdb
          configMap:
            name: {{ include "wso2am-mysql.fullname" . }}-initdb
