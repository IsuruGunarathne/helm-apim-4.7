postgresql:
  image: "postgres:17"
  password: "root"
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  persistence:
    enabled: true
    size: "1Gi"
    storageClass: ""

databases:
  - apim_db
  - shared_db

schemaInit:
  enabled: true
  apim:
    image: "docker.io/wso2/wso2am:4.7.0-alpha"
    home: "/home/wso2carbon/wso2am-4.7.0-alpha"
  scripts:
    apim_db: "dbscripts/apimgt/postgresql.sql"
    shared_db: "dbscripts/postgresql.sql"
