{{- if .Values.schemaInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wso2am-postgresql.fullname" . }}-schema-init
  labels:
    {{- include "wso2am-postgresql.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "wso2am-postgresql.selectorLabels" . | nindent 8 }}
        job: schema-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z {{ include "wso2am-postgresql.fullname" . }} 5432; do
                echo "PostgreSQL not ready, retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready"
        - name: extract-scripts
          image: {{ .Values.schemaInit.apim.image }}
          command:
            - /bin/sh
            - -c
            - |
              cp {{ .Values.schemaInit.apim.home }}/{{ .Values.schemaInit.scripts.apim_db }} /scripts/apim_db.sql
              cp {{ .Values.schemaInit.apim.home }}/{{ .Values.schemaInit.scripts.shared_db }} /scripts/shared_db.sql
              echo "SQL scripts extracted"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      containers:
        - name: schema-loader
          image: {{ .Values.postgresql.image }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Loading apim_db schema..."
              PGPASSWORD=$POSTGRES_PASSWORD psql -h {{ include "wso2am-postgresql.fullname" . }} -U postgres -d apim_db -f /scripts/apim_db.sql
              echo "Loading shared_db schema..."
              PGPASSWORD=$POSTGRES_PASSWORD psql -h {{ include "wso2am-postgresql.fullname" . }} -U postgres -d shared_db -f /scripts/shared_db.sql
              echo "Verifying..."
              PGPASSWORD=$POSTGRES_PASSWORD psql -h {{ include "wso2am-postgresql.fullname" . }} -U postgres -c \
                "SELECT 'apim_db' AS db, COUNT(*) AS tables_count FROM information_schema.tables WHERE table_schema='public' AND table_catalog='apim_db' UNION ALL SELECT 'shared_db', COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_catalog='shared_db';"
              echo "Schema initialization complete!"
          env:
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.password | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          emptyDir: {}
{{- end }}
