fullnameOverride: "wso2am-tm"

aws:
  enabled: false
azure:
  enabled: false
gcp:
  enabled: false

kubernetes:
  gatewayAPI:
    enabled: false
  initContainers:
    - name: mssql-driver-init
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          wget -O /jdbc-driver/mssql-jdbc-12.8.1.jre11.jar \
            "https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/12.8.1.jre11/mssql-jdbc-12.8.1.jre11.jar" && \
          echo "MSSQL JDBC driver downloaded successfully"
      volumeMounts:
        - name: mssql-driver-vol
          mountPath: /jdbc-driver
  extraVolumes:
    - name: mssql-driver-vol
      emptyDir: {}
  extraVolumeMounts:
    - name: mssql-driver-vol
      mountPath: /home/wso2carbon/wso2am-tm-4.7.0-alpha/repository/components/lib/mssql-jdbc-12.8.1.jre11.jar
      subPath: mssql-jdbc-12.8.1.jre11.jar
      readOnly: true

wso2:
  apim:
    version: "4.7.0"
    portOffset: 0
    secureVaultEnabled: false
    configurations:
      adminUsername: "admin"
      adminPassword: "admin"
      encryption:
        key: "ABCDefgh12345678"
      security:
        jksSecretName: ""
        keystores:
          primary:
            enabled: false
          tls:
            enabled: true
            password: "wso2carbon"
            keyPassword: "wso2carbon"
          internal:
            enabled: false
        truststore:
          password: "wso2carbon"
      databases:
        type: "mssql"
        jdbc:
          driver: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
        apim_db:
          url: "jdbc:sqlserver://10.1.3.4:1433;databaseName=apim_db;encrypt=true;trustServerCertificate=true"
          username: "apimadminwest"
          password: "distributed@2"
          poolParameters:
            validationQuery: "SELECT 1"
        shared_db:
          url: "jdbc:sqlserver://10.1.3.4:1433;databaseName=shared_db;encrypt=true;trustServerCertificate=true"
          username: "apimadminwest"
          password: "distributed@2"
          poolParameters:
            validationQuery: "SELECT 1"
      km:
        serviceUrl: "wso2am-cp-service"
        servicePort: 9443
      eventhub:
        serviceUrl: "wso2am-cp-service"
        urls:
          - "wso2am-cp-1-service"
          - "wso2am-cp-2-service"

  deployment:
    highAvailability: true
    startupProbe:
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 12
    image:
      registry: "docker.io"
      repository: "isurugunarathne/wso2apim:tm-4.7.0-beta"
      digest: "sha256:e3f29f20fe8d5d4757441ed3a5c0c0171bb48a70ba5c97fc1a88d6864685ee6a"
      imagePullPolicy: Always
    resources:
      requests:
        memory: "4Gi"
        cpu: "1500m"
      limits:
        memory: "4Gi"
        cpu: "1800m"
      jvm:
        memory:
          xms: "1024m"
          xmx: "2048m"
