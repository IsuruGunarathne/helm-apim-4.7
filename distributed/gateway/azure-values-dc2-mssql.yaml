fullnameOverride: "wso2am-gw"

aws:
  enabled: false
azure:
  enabled: false
gcp:
  enabled: false

kubernetes:
  gatewayAPI:
    enabled: false
  ingress:
    tlsSecret: "apim-ingress-tls"
    gateway:
      enabled: true
      hostname: "gw.wus2.apim.example.com"
      annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
    websocket:
      enabled: false
    websub:
      enabled: false
  initContainers:
    - name: mssql-driver-init
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          wget -O /jdbc-driver/mssql-jdbc-12.8.1.jre11.jar \
            "https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/12.8.1.jre11/mssql-jdbc-12.8.1.jre11.jar" && \
          echo "MSSQL JDBC driver downloaded successfully"
      volumeMounts:
        - name: mssql-driver-vol
          mountPath: /jdbc-driver
  extraVolumes:
    - name: mssql-driver-vol
      emptyDir: {}
  extraVolumeMounts:
    - name: mssql-driver-vol
      mountPath: /home/wso2carbon/wso2am-universal-gw-4.7.0-alpha/repository/components/lib/mssql-jdbc-12.8.1.jre11.jar
      subPath: mssql-jdbc-12.8.1.jre11.jar
      readOnly: true

wso2:
  apim:
    version: "4.7.0"
    portOffset: 0
    secureVaultEnabled: false
    configurations:
      adminUsername: "admin"
      adminPassword: "admin"
      encryption:
        key: "ABCDefgh12345678"
      security:
        jksSecretName: ""
        keystores:
          primary:
            enabled: false
          tls:
            enabled: true
            password: "wso2carbon"
            keyPassword: "wso2carbon"
          internal:
            enabled: false
        truststore:
          password: "wso2carbon"
      transport:
        http:
          proxyPort: 80
        https:
          proxyPort: 443
      databases:
        type: "mssql"
        jdbc:
          driver: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
        shared_db:
          url: "jdbc:sqlserver://10.1.3.4:1433;databaseName=shared_db;encrypt=true;trustServerCertificate=true"
          username: "apimadminwest"
          password: "distributed@2"
          poolParameters:
            validationQuery: "SELECT 1"
      km:
        serviceUrl: "wso2am-cp-service"
        servicePort: 9443
      throttling:
        serviceUrl: "wso2am-cp-service"
        servicePort: 9443
        urls:
          - "wso2am-cp-1-service"
          - "wso2am-cp-2-service"
        portOffset: 0
      eventhub:
        enabled: true
        serviceUrl: "wso2am-cp-service"
        servicePort: 9443
        urls:
          - "wso2am-cp-1-service"
          - "wso2am-cp-2-service"

  deployment:
    replicas: 2
    minReplicas: 2
    maxReplicas: 4
    startupProbe:
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 12
    image:
      registry: "docker.io"
      repository: "wso2/wso2am-universal-gw:4.7.0-alpha"
      digest: "sha256:e2ff31c45c6f717471f0d9d15cb05cc5bb160cfb51a5fcf53aa82109bd02046f"
      imagePullPolicy: IfNotPresent
    resources:
      requests:
        memory: "4Gi"
        cpu: "1500m"
      limits:
        memory: "4Gi"
        cpu: "1800m"
      jvm:
        memory:
          xms: "1024m"
          xmx: "2048m"
