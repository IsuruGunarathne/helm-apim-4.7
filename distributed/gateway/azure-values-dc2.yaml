fullnameOverride: "wso2am-gw"

aws:
  enabled: false
azure:
  enabled: false
gcp:
  enabled: false

kubernetes:
  gatewayAPI:
    enabled: false
  ingress:
    tlsSecret: "apim-ingress-tls"
    gateway:
      enabled: true
      hostname: "gw.wus2.apim.example.com"
      annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
    websocket:
      enabled: false
    websub:
      enabled: false
  initContainers:
    - name: postgresql-driver-init
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          wget -O /jdbc-driver/postgresql-42.7.4.jar \
            "https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.4/postgresql-42.7.4.jar" && \
          echo "PostgreSQL JDBC driver downloaded successfully"
      volumeMounts:
        - name: postgresql-driver-vol
          mountPath: /jdbc-driver
  extraVolumes:
    - name: postgresql-driver-vol
      emptyDir: {}
  extraVolumeMounts:
    - name: postgresql-driver-vol
      mountPath: /home/wso2carbon/wso2am-universal-gw-4.7.0-beta/repository/components/lib/postgresql-42.7.4.jar
      subPath: postgresql-42.7.4.jar
      readOnly: true

wso2:
  apim:
    version: "4.7.0"
    portOffset: 0
    secureVaultEnabled: false
    configurations:
      adminUsername: "admin"
      adminPassword: "admin"
      encryption:
        key: "ABCDefgh12345678"
      security:
        jksSecretName: ""
        keystores:
          primary:
            enabled: false
          tls:
            enabled: true
            password: "wso2carbon"
            keyPassword: "wso2carbon"
          internal:
            enabled: false
        truststore:
          password: "wso2carbon"
      transport:
        http:
          proxyPort: 80
        https:
          proxyPort: 443
      databases:
        type: "postgres"
        jdbc:
          driver: "org.postgresql.Driver"
        shared_db:
          url: "jdbc:postgresql://apim-4-7-wus2.postgres.database.azure.com:5432/shared_db?sslmode=require"
          username: "apimadminwest"
          password: "DATABASE_PASSWORD"
          poolParameters:
            validationQuery: "SELECT 1"
      km:
        serviceUrl: "wso2am-cp-service"
        servicePort: 9443
      throttling:
        serviceUrl: "wso2am-cp-service"
        servicePort: 9443
        urls:
          - "wso2am-cp-1-service"
          - "wso2am-cp-2-service"
        portOffset: 0
      eventhub:
        enabled: true
        serviceUrl: "wso2am-cp-service"
        servicePort: 9443
        urls:
          - "wso2am-cp-1-service"
          - "wso2am-cp-2-service"

  deployment:
    replicas: 2
    minReplicas: 2
    maxReplicas: 4
    startupProbe:
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 12
    image:
      registry: "docker.io"
      repository: "wso2/wso2am-universal-gw:4.7.0-beta"
      imagePullPolicy: Always
    resources:
      requests:
        memory: "4Gi"
        cpu: "1500m"
      limits:
        memory: "4Gi"
        cpu: "1800m"
      jvm:
        memory:
          xms: "1024m"
          xmx: "2048m"
