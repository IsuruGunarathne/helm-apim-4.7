fullnameOverride: "wso2am-cp"

aws:
  enabled: false
azure:
  enabled: false
gcp:
  enabled: false

kubernetes:
  gatewayAPI:
    enabled: false
  ingress:
    tlsSecret: "apim-ingress-tls"
    controlPlane:
      enabled: true
      hostname: "cp.eus2.apim.example.com"
      annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
  initContainers:
    - name: mssql-driver-init
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          wget -O /jdbc-driver/mssql-jdbc-12.8.1.jre11.jar \
            "https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/12.8.1.jre11/mssql-jdbc-12.8.1.jre11.jar" && \
          echo "MSSQL JDBC driver downloaded successfully"
      volumeMounts:
        - name: mssql-driver-vol
          mountPath: /jdbc-driver
  extraVolumes:
    - name: mssql-driver-vol
      emptyDir: {}
  extraVolumeMounts:
    - name: mssql-driver-vol
      mountPath: /home/wso2carbon/wso2am-acp-4.7.0-alpha/repository/components/lib/mssql-jdbc-12.8.1.jre11.jar
      subPath: mssql-jdbc-12.8.1.jre11.jar
      readOnly: true

wso2:
  apim:
    version: "4.7.0"
    portOffset: 0
    secureVaultEnabled: false
    configurations:
      adminUsername: "admin"
      adminPassword: "admin"
      encryption:
        key: "ABCDefgh12345678"
      security:
        jksSecretName: ""
        keystores:
          primary:
            enabled: false
          tls:
            enabled: true
            password: "wso2carbon"
            keyPassword: "wso2carbon"
          internal:
            enabled: false
        truststore:
          password: "wso2carbon"
      transport:
        https:
          proxyPort: 443
      databases:
        type: "mssql"
        jdbc:
          driver: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
        apim_db:
          url: "jdbc:sqlserver://10.0.3.4:1433;databaseName=apim_db;encrypt=true;trustServerCertificate=true"
          username: "apimadmineast"
          password: "distributed@2"
          poolParameters:
            validationQuery: "SELECT 1"
        shared_db:
          url: "jdbc:sqlserver://10.0.3.4:1433;databaseName=shared_db;encrypt=true;trustServerCertificate=true"
          username: "apimadmineast"
          password: "distributed@2"
          poolParameters:
            validationQuery: "SELECT 1"
      oauth_config:
        oauth2JWKSUrl: "https://wso2am-cp-service:9443/oauth2/jwks"
      gateway:
        environments:
          - name: "Default"
            type: "hybrid"
            gatewayType: "Regular"
            provider: "wso2"
            displayInApiConsole: true
            description: "DC1 Gateway - East US 2"
            showAsTokenEndpointUrl: true
            serviceName: "wso2am-gw-service"
            servicePort: 9443
            wsHostname: "gw.eus2.apim.example.com"
            httpHostname: "gw.eus2.apim.example.com"
            websubHostname: "gw.eus2.apim.example.com"

  deployment:
    highAvailability: true
    startupProbe:
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 12
    image:
      registry: "docker.io"
      repository: "isurugunarathne/wso2apim:acp-4.7.0-beta"
      digest: "sha256:5ff06a1b35cc16d573dc5784f6a95639f45c9881fbf938e6bcf31cc391e51f28"
      imagePullPolicy: Always
    resources:
      requests:
        memory: "4Gi"
        cpu: "1500m"
      limits:
        memory: "4Gi"
        cpu: "1800m"
      jvm:
        memory:
          xms: "1024m"
          xmx: "2048m"
    persistence:
      solrIndexing:
        enabled: false
