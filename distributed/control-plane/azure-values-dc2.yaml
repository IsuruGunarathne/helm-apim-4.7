fullnameOverride: "wso2am-cp"

aws:
  enabled: false
azure:
  enabled: false
gcp:
  enabled: false

kubernetes:
  gatewayAPI:
    enabled: false
  ingress:
    controlPlane:
      enabled: true
      hostname: "cp.wus2.apim.example.com"
      annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
  initContainers:
    - name: postgresql-driver-init
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          wget -O /jdbc-driver/postgresql-42.7.4.jar \
            "https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.4/postgresql-42.7.4.jar" && \
          echo "PostgreSQL JDBC driver downloaded successfully"
      volumeMounts:
        - name: postgresql-driver-vol
          mountPath: /jdbc-driver
  extraVolumes:
    - name: postgresql-driver-vol
      emptyDir: {}
  extraVolumeMounts:
    - name: postgresql-driver-vol
      mountPath: /home/wso2carbon/wso2am-acp-4.7.0-alpha/repository/components/lib/postgresql-42.7.4.jar
      subPath: postgresql-42.7.4.jar
      readOnly: true

wso2:
  apim:
    version: "4.7.0"
    portOffset: 0
    secureVaultEnabled: false
    configurations:
      adminUsername: "admin"
      adminPassword: "admin"
      encryption:
        key: "ABCDefgh12345678"
      security:
        jksSecretName: ""
        keystores:
          primary:
            enabled: false
          tls:
            enabled: true
            password: "wso2carbon"
            keyPassword: "wso2carbon"
          internal:
            enabled: false
        truststore:
          password: "wso2carbon"
      transport:
        https:
          proxyPort: 443
      databases:
        type: "postgres"
        jdbc:
          driver: "org.postgresql.Driver"
        apim_db:
          url: "jdbc:postgresql://apim-4-7-wus2.postgres.database.azure.com:5432/apim_db?sslmode=require"
          username: "apimadminwest"
          password: "DATABASE_PASSWORD"
          poolParameters:
            validationQuery: "SELECT 1"
        shared_db:
          url: "jdbc:postgresql://apim-4-7-wus2.postgres.database.azure.com:5432/shared_db?sslmode=require"
          username: "apimadminwest"
          password: "DATABASE_PASSWORD"
          poolParameters:
            validationQuery: "SELECT 1"
      oauth_config:
        oauth2JWKSUrl: "https://wso2am-cp-service:9443/oauth2/jwks"
      gateway:
        environments:
          - name: "Default"
            type: "hybrid"
            gatewayType: "Regular"
            provider: "wso2"
            displayInApiConsole: true
            description: "DC2 Gateway - West US 2"
            showAsTokenEndpointUrl: true
            serviceName: "wso2am-gw-service"
            servicePort: 9443
            wsHostname: "gw.wus2.apim.example.com"
            httpHostname: "gw.wus2.apim.example.com"
            websubHostname: "gw.wus2.apim.example.com"

  deployment:
    highAvailability: true
    startupProbe:
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 12
    image:
      registry: "docker.io"
      repository: "wso2/wso2am-acp:4.7.0-alpha"
      digest: "sha256:90225970479472f1b11d245eee9db9eb2b063c288e3c6d7a1e2b5f0f6d0f966f"
      imagePullPolicy: IfNotPresent
    resources:
      requests:
        memory: "4Gi"
        cpu: "1500m"
      limits:
        memory: "4Gi"
        cpu: "1800m"
      jvm:
        memory:
          xms: "1024m"
          xmx: "2048m"
    persistence:
      solrIndexing:
        enabled: false
