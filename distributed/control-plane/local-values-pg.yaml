fullnameOverride: "wso2am-cp"

aws:
  enabled: false
azure:
  enabled: false
gcp:
  enabled: false

kubernetes:
  gatewayAPI:
    enabled: false
  ingress:
    controlPlane:
      enabled: false
      hostname: "localhost"
  initContainers:
    - name: postgresql-driver-init
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          wget -O /jdbc-driver/postgresql-42.7.4.jar \
            "https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.4/postgresql-42.7.4.jar" && \
          echo "PostgreSQL JDBC driver downloaded successfully"
      volumeMounts:
        - name: postgresql-driver-vol
          mountPath: /jdbc-driver
  extraVolumes:
    - name: postgresql-driver-vol
      emptyDir: {}
  extraVolumeMounts:
    - name: postgresql-driver-vol
      mountPath: /home/wso2carbon/wso2am-acp-4.7.0-SNAPSHOT/repository/components/lib/postgresql-42.7.4.jar
      subPath: postgresql-42.7.4.jar
      readOnly: true

wso2:
  apim:
    version: "4.7.0"
    portOffset: 0
    secureVaultEnabled: false
    configurations:
      adminUsername: "admin"
      adminPassword: "admin"
      encryption:
        key: "ABCDefgh12345678"
      security:
        jksSecretName: ""
        keystores:
          primary:
            enabled: false
          tls:
            enabled: true
            password: "wso2carbon"
            keyPassword: "wso2carbon"
          internal:
            enabled: false
        truststore:
          password: "wso2carbon"
      transport:
        https:
          proxyPort: 9443
      databases:
        type: "postgres"
        jdbc:
          driver: "org.postgresql.Driver"
        apim_db:
          url: "jdbc:postgresql://postgresql.apim.svc:5432/apim_db"
          username: "postgres"
          password: "root"
          poolParameters:
            validationQuery: "SELECT 1"
        shared_db:
          url: "jdbc:postgresql://postgresql.apim.svc:5432/shared_db"
          username: "postgres"
          password: "root"
          poolParameters:
            validationQuery: "SELECT 1"
      oauth_config:
        oauth2JWKSUrl: "https://wso2am-cp-service:9443/oauth2/jwks"
      gateway:
        environments:
          - name: "Default"
            type: "hybrid"
            gatewayType: "Regular"
            provider: "wso2"
            displayInApiConsole: true
            description: "This is a hybrid gateway that handles both production and sandbox token traffic."
            showAsTokenEndpointUrl: true
            serviceName: "localhost"
            servicePort: 9443
            wsHostname: "localhost"
            httpHostname: "localhost"
            websubHostname: "localhost"

  deployment:
    highAvailability: false
    startupProbe:
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 6
    image:
      registry: "docker.io"
      repository: "isurugunarathne/wso2apim:acp-4.7.0-beta"
      digest: "sha256:5ff06a1b35cc16d573dc5784f6a95639f45c9881fbf938e6bcf31cc391e51f28"
      imagePullPolicy: Always
    resources:
      requests:
        memory: "4Gi"
        cpu: "1500m"
      limits:
        memory: "5Gi"
        cpu: "2000m"
      jvm:
        memory:
          xms: "1024m"
          xmx: "2048m"
    persistence:
      solrIndexing:
        enabled: false
