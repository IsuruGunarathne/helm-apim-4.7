aws:
  enabled: false
azure:
  enabled: false
gcp:
  enabled: false

kubernetes:
  gatewayAPI:
    enabled: false
  ingress:
    management:
      enabled: false
      hostname: "localhost"
    gateway:
      enabled: false
      hostname: "localhost"
  initContainers:
    - name: mysql-connector-init
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          wget -O /jdbc-driver/mysql-connector-j-9.1.0.jar \
            "https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/9.1.0/mysql-connector-j-9.1.0.jar" && \
          echo "MySQL connector downloaded successfully"
      volumeMounts:
        - name: mysql-connector-vol
          mountPath: /jdbc-driver
  extraVolumes:
    - name: mysql-connector-vol
      emptyDir: {}
  extraVolumeMounts:
    - name: mysql-connector-vol
      mountPath: /home/wso2carbon/wso2am-4.7.0-alpha/repository/components/lib/mysql-connector-j-9.1.0.jar
      subPath: mysql-connector-j-9.1.0.jar
      readOnly: true

wso2:
  apim:
    version: "4.7.0"
    secureVaultEnabled: false
    configurations:
      adminUsername: "admin"
      adminPassword: "admin"
      encryption:
        key: "ABCDefgh12345678"
      security:
        keystores:
          tls:
            enabled: true
            password: "wso2carbon"
            keyPassword: "wso2carbon"
        truststore:
          password: "wso2carbon"
      transport:
        http:
          proxyPort: 9763
        https:
          proxyPort: 9443
      gateway:
        environments:
          - name: "Default"
            type: "hybrid"
            gatewayType: "Regular"
            provider: "wso2"
            displayInApiConsole: true
            description: "This is a hybrid gateway that handles both production and sandbox token traffic."
            showAsTokenEndpointUrl: true
            serviceName: "localhost"
            servicePort: 9443
            wsHostname: "localhost"
            httpHostname: "localhost"
            websubHostname: "localhost"
      databases:
        type: "mysql"
        jdbc:
          driver: "com.mysql.cj.jdbc.Driver"
        apim_db:
          url: "jdbc:mysql://mysql.apim.svc:3306/apim_db?useSSL=false&amp;allowPublicKeyRetrieval=true&amp;autoReconnect=true"
          username: "root"
          password: "root"
        shared_db:
          url: "jdbc:mysql://mysql.apim.svc:3306/shared_db?useSSL=false&amp;allowPublicKeyRetrieval=true&amp;autoReconnect=true"
          username: "root"
          password: "root"

  deployment:
    highAvailability: false
    image:
      registry: "docker.io"
      repository: "wso2/wso2am:4.7.0-alpha"
      digest: "sha256:086353fa4cb4904b6f0c1ba90d2915a5fb9680bedeb7a6a301717044d1c41e44"
      imagePullPolicy: IfNotPresent
    resources:
      requests:
        memory: "2Gi"
        cpu: "1500m"
      limits:
        memory: "3Gi"
        cpu: "2000m"
      jvm:
        memory:
          xms: "2048m"
          xmx: "2048m"
    persistence:
      solrIndexing:
        enabled: false
